name: CI - Quality Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  MAERSK_API_KEY: ${{ secrets.MAERSK_API_KEY }}
  MAERSK_API_SECRET: ${{ secrets.MAERSK_API_SECRET }}
  MAERSK_API_BASE_URL: ${{ secrets.MAERSK_API_BASE_URL }}
  DATABASE_URL: postgresql://postgres:Gariba1ddi@db.kzbtwgpedbojxnfiprsw.supabase.co:5432/postgres

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Generate cache key
        id: cache-key
        run: |
          echo "value=node-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Enable corepack
        run: corepack enable
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'
          
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
          
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH || '$HOME/.local/share/pnpm/store' }}
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            node-${{ runner.os }}-
            
      - name: Use npm registry mirror
        run: pnpm set registry https://registry.npmmirror.com
        
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          echo "📁 Current directory: $(pwd)"
          echo "📄 Checking for pnpm-lock.yaml:"
          ls -la pnpm-lock.yaml || echo "❌ pnpm-lock.yaml not found"
          echo "🚀 Running pnpm install with retry options..."
          pnpm install --fetch-retries=6 --fetch-timeout=60000 --network-timeout=60000
          
      - name: Generate Prisma Client
        run: |
          echo "🔧 Generating Prisma Client..."
          pnpm exec prisma generate --schema=prisma/schema.prisma
          echo "🔧 Generating Prisma Client for apps/web..."
          cd apps/web
          pnpm exec prisma generate --schema=../../prisma/schema.prisma
          cd ../..
          echo "✅ Prisma Client generated successfully!"
        
      - name: Lint
        run: pnpm lint
        
      - name: Type check
        run: pnpm type-check
        
      - name: Unit tests
        run: pnpm test
        if: hashFiles('**/*.test.{js,ts,jsx,tsx}') != ''
        
      - name: Build
        run: |
          echo "🔧 Starting build process..."
          echo "📁 Current directory: $(pwd)"
          echo "📦 Node version: $(node --version)"
          echo "📦 pnpm version: $(pnpm --version)"
          echo "🔍 Environment variables check:"
          echo "  NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:+SET}"
          echo "  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:+SET}"
          echo "  MAERSK_API_KEY: ${MAERSK_API_KEY:+SET}"
          echo "  MAERSK_API_SECRET: ${MAERSK_API_SECRET:+SET}"
          echo "🚀 Running build..."
          pnpm build || (echo "❌ Build failed with exit code $?" && exit 1)
          echo "✅ Build completed successfully!"

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'
          
      - name: Use npm registry mirror
        run: pnpm set registry https://registry.npmmirror.com
        
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          echo "📁 Current directory: $(pwd)"
          echo "📄 Checking for pnpm-lock.yaml:"
          ls -la pnpm-lock.yaml || echo "❌ pnpm-lock.yaml not found"
          echo "🚀 Running pnpm install with retry options..."
          pnpm install --fetch-retries=6 --fetch-timeout=60000 --network-timeout=60000
        
      - name: Security audit
        run: pnpm audit --audit-level high
        
      - name: Check for known vulnerabilities
        run: |
          echo "🔍 Checking for known vulnerabilities..."
          pnpm audit --audit-level moderate || {
            echo "⚠️  Found moderate or higher vulnerabilities"
            echo "Please review and fix security issues"
            exit 1
          }
          echo "✅ No high/critical vulnerabilities found"

  database:
    name: Database Migration Check
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'
          
      - name: Use npm registry mirror
        run: pnpm set registry https://registry.npmmirror.com
        
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          echo "📁 Current directory: $(pwd)"
          echo "📄 Checking for pnpm-lock.yaml:"
          ls -la pnpm-lock.yaml || echo "❌ pnpm-lock.yaml not found"
          echo "🚀 Running pnpm install with retry options..."
          pnpm install --fetch-retries=6 --fetch-timeout=60000 --network-timeout=60000
        
      - name: Check Prisma schema
        if: hashFiles('supabase/migrations/**', 'prisma/**') != ''
        run: |
          echo "🔍 Checking Prisma schema..."
          echo "📁 Current directory: $(pwd)"
          echo "📄 Checking for schema.prisma:"
          ls -la prisma/schema.prisma || echo "❌ schema.prisma not found in root"
          echo "📦 Prisma version:"
          npx prisma --version || echo "❌ Prisma not found, installing..."
          npx prisma validate --schema=prisma/schema.prisma
          echo "✅ Prisma schema is valid"
          
      - name: Generate Prisma client
        if: hashFiles('supabase/migrations/**', 'prisma/**') != ''
        run: |
          echo "🔧 Generating Prisma client..."
          echo "📁 Current directory: $(pwd)"
          echo "📦 Prisma version:"
          npx prisma --version || echo "❌ Prisma not found, installing..."
          npx prisma generate --schema=prisma/schema.prisma
          echo "✅ Prisma client generated successfully"
