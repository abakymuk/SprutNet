name: CI on Develop

on:
  push:
    branches: [ develop ]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  MAERSK_API_KEY: ${{ secrets.MAERSK_API_KEY }}
  MAERSK_API_SECRET: ${{ secrets.MAERSK_API_SECRET }}
  MAERSK_API_BASE_URL: ${{ secrets.MAERSK_API_BASE_URL }}

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MAERSK_API_KEY: ${{ secrets.MAERSK_API_KEY }}
      MAERSK_API_SECRET: ${{ secrets.MAERSK_API_SECRET }}
      MAERSK_API_BASE_URL: ${{ secrets.MAERSK_API_BASE_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Enable corepack
        run: corepack enable
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'
          
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
          
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: .
        
      - name: Lint
        run: pnpm lint
        
      - name: Type check
        run: pnpm type-check
        
      - name: Unit tests
        run: pnpm test
        if: hashFiles('**/*.test.{js,ts,jsx,tsx}') != ''
        
      - name: Build
        run: |
          echo "🔧 Starting build process..."
          echo "📁 Current directory: $(pwd)"
          echo "📦 Node version: $(node --version)"
          echo "📦 pnpm version: $(pnpm --version)"
          echo "🔍 Environment variables check:"
          echo "  NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:+SET}"
          echo "  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:+SET}"
          echo "  MAERSK_API_KEY: ${MAERSK_API_KEY:+SET}"
          echo "  MAERSK_API_SECRET: ${MAERSK_API_SECRET:+SET}"
          echo "  VERCEL_TOKEN: ${VERCEL_TOKEN:+SET}"
          echo "  VERCEL_ORG_ID: ${VERCEL_ORG_ID:+SET}"
          echo "  VERCEL_PROJECT_ID: ${VERCEL_PROJECT_ID:+SET}"
          echo "🚀 Running build..."
          pnpm build || (echo "❌ Build failed with exit code $?" && exit 1)
          echo "✅ Build completed successfully!"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: quality
    environment: staging
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MAERSK_API_KEY: ${{ secrets.MAERSK_API_KEY }}
      MAERSK_API_SECRET: ${{ secrets.MAERSK_API_SECRET }}
      MAERSK_API_BASE_URL: ${{ secrets.MAERSK_API_BASE_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'
          
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: .
        
      - name: Build
        run: |
          echo "🔧 Starting build process for deployment..."
          echo "📁 Current directory: $(pwd)"
          echo "🔍 Environment variables check:"
          echo "  NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:+SET}"
          echo "  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:+SET}"
          echo "  MAERSK_API_KEY: ${MAERSK_API_KEY:+SET}"
          echo "  MAERSK_API_SECRET: ${MAERSK_API_SECRET:+SET}"
          echo "  VERCEL_TOKEN: ${VERCEL_TOKEN:+SET}"
          echo "  VERCEL_ORG_ID: ${VERCEL_ORG_ID:+SET}"
          echo "  VERCEL_PROJECT_ID: ${VERCEL_PROJECT_ID:+SET}"
          echo "🚀 Running build..."
          pnpm build || (echo "❌ Build failed with exit code $?" && exit 1)
          echo "✅ Build completed successfully!"
          
      - name: Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod=false'
