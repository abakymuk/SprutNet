name: Database Management

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'supabase/migrations/**'
      - 'prisma/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Database action to perform'
        required: true
        default: 'migrate'
        type: choice
        options:
          - migrate
          - reset
          - seed

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  database-migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.action == 'migrate' || github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'
          
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          echo "📁 Current directory: $(pwd)"
          echo "📄 Checking for pnpm-lock.yaml:"
          ls -la pnpm-lock.yaml || echo "❌ pnpm-lock.yaml not found"
          echo "🚀 Running pnpm install..."
          pnpm install
        
      - name: Install Supabase CLI
        run: |
          curl -fsSL https://supabase.com/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
      - name: Setup Supabase
        run: |
          echo "🔧 Setting up Supabase..."
          supabase --version
          
      - name: Validate Prisma schema
        run: |
          echo "🔍 Validating Prisma schema..."
          echo "📁 Current directory: $(pwd)"
          echo "📄 Checking for schema.prisma:"
          ls -la prisma/schema.prisma || echo "❌ schema.prisma not found in root"
          npx prisma validate --schema=prisma/schema.prisma
          echo "✅ Prisma schema is valid"
          
      - name: Generate Prisma client
        run: |
          echo "🔧 Generating Prisma client..."
          echo "📁 Current directory: $(pwd)"
          npx prisma generate --schema=prisma/schema.prisma
          echo "✅ Prisma client generated"
          
      - name: Run database migrations
        run: |
          echo "🚀 Running database migrations..."
          echo "📁 Current directory: $(pwd)"
          npx prisma db push --schema=prisma/schema.prisma --accept-data-loss
          echo "✅ Database migrations completed"
          
      - name: Verify database connection
        run: |
          echo "🔍 Verifying database connection..."
          echo "📁 Current directory: $(pwd)"
          npx prisma db pull --schema=prisma/schema.prisma
          echo "✅ Database connection verified"

  database-reset:
    name: Database Reset
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.action == 'reset'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'
          
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          echo "📁 Current directory: $(pwd)"
          echo "📄 Checking for pnpm-lock.yaml:"
          ls -la pnpm-lock.yaml || echo "❌ pnpm-lock.yaml not found"
          echo "🚀 Running pnpm install..."
          pnpm install
        
      - name: Reset database
        run: |
          echo "⚠️  Resetting database..."
          echo "📁 Current directory: $(pwd)"
          npx prisma db push --schema=prisma/schema.prisma --force-reset
          echo "✅ Database reset completed"
          
      - name: Seed database
        run: |
          echo "🌱 Seeding database..."
          echo "📁 Current directory: $(pwd)"
          npx prisma db seed --schema=prisma/schema.prisma
          echo "✅ Database seeded"

  database-seed:
    name: Database Seed
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.action == 'seed'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'
          
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          echo "📁 Current directory: $(pwd)"
          echo "📄 Checking for pnpm-lock.yaml:"
          ls -la pnpm-lock.yaml || echo "❌ pnpm-lock.yaml not found"
          echo "🚀 Running pnpm install..."
          pnpm install
        
      - name: Seed database
        run: |
          echo "🌱 Seeding database..."
          cd apps/web
          npx prisma db seed
          echo "✅ Database seeded successfully"
