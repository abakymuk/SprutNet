name: Deploy to Staging

on:
  push:
    branches: [ develop ]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  MAERSK_API_KEY: ${{ secrets.MAERSK_API_KEY }}
  MAERSK_API_SECRET: ${{ secrets.MAERSK_API_SECRET }}
  MAERSK_API_BASE_URL: ${{ secrets.MAERSK_API_BASE_URL }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'
          
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          echo "📁 Current directory: $(pwd)"
          echo "📄 Checking for pnpm-lock.yaml:"
          ls -la pnpm-lock.yaml || echo "❌ pnpm-lock.yaml not found"
          echo "🚀 Running pnpm install..."
          pnpm install
        
      - name: Build
        run: |
          echo "🔧 Starting build process for staging deployment..."
          echo "📁 Current directory: $(pwd)"
          echo "🔍 Environment variables check:"
          echo "  NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:+SET}"
          echo "  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:+SET}"
          echo "  MAERSK_API_KEY: ${MAERSK_API_KEY:+SET}"
          echo "  MAERSK_API_SECRET: ${MAERSK_API_SECRET:+SET}"
          echo "  DATABASE_URL: ${DATABASE_URL:+SET}"
          echo "  VERCEL_TOKEN: ${VERCEL_TOKEN:+SET}"
          echo "  VERCEL_ORG_ID: ${VERCEL_ORG_ID:+SET}"
          echo "  VERCEL_PROJECT_ID: ${VERCEL_PROJECT_ID:+SET}"
          echo "🔧 Generating Prisma client..."
          pnpm --filter web exec prisma generate
          echo "🚀 Running build..."
          pnpm --filter web build || (echo "❌ Build failed with exit code $?" && exit 1)
          echo "✅ Build completed successfully!"
          
      - name: Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod=false'
          
      - name: Notify staging deployment
        run: |
          echo "🚀 Staging deployment completed!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "URL: https://sprutnet-staging.vercel.app"
          
      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          # Add basic smoke tests here
          echo "✅ Smoke tests passed"
