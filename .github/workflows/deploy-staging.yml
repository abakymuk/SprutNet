name: Deploy to Staging

on:
  push:
    branches: [ develop ]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  MAERSK_API_KEY: ${{ secrets.MAERSK_API_KEY }}
  MAERSK_API_SECRET: ${{ secrets.MAERSK_API_SECRET }}
  MAERSK_API_BASE_URL: ${{ secrets.MAERSK_API_BASE_URL }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '8'
          run_install: false
          
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            */*/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            node-${{ runner.os }}-
            
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          echo "📁 Current directory: $(pwd)"
          echo "📄 Checking for pnpm-lock.yaml:"
          ls -la pnpm-lock.yaml || echo "❌ pnpm-lock.yaml not found"
          echo "🚀 Running pnpm install..."
          pnpm install --prefer-offline
          
      - name: Clean Vercel cache
        run: |
          echo "🧹 Cleaning Vercel cache..."
          rm -rf .vercel || echo "No .vercel directory found"
          echo "✅ Vercel cache cleaned"
        
      - name: Debug Environment
        run: |
          echo "🔍 Debugging environment..."
          echo "📁 Current directory: $(pwd)"
          echo "📄 Directory contents:"
          ls -la
          echo "📄 apps/web contents:"
          ls -la apps/web/
          echo "📄 prisma contents:"
          ls -la prisma/
          echo "🔍 Environment variables:"
          env | grep -E "(NEXT_PUBLIC_|MAERSK_|DATABASE_|VERCEL_)" || echo "No matching env vars found"
          echo "🔍 Node.js and pnpm versions:"
          node --version
          pnpm --version
          echo "🔍 Checking if npx is available:"
          which npx || echo "npx not found"
          npx --version || echo "npx version check failed"
          
      - name: Build
        run: |
          echo "🔧 Starting build process for staging deployment..."
          echo "📁 Current directory: $(pwd)"
          echo "🔍 Environment variables check:"
          echo "  NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:+SET}"
          echo "  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:+SET}"
          echo "  MAERSK_API_KEY: ${MAERSK_API_KEY:+SET}"
          echo "  MAERSK_API_SECRET: ${MAERSK_API_SECRET:+SET}"
          echo "  DATABASE_URL: ${DATABASE_URL:+SET}"
          echo "  VERCEL_TOKEN: ${VERCEL_TOKEN:+SET}"
          echo "  VERCEL_ORG_ID: ${VERCEL_ORG_ID:+SET}"
          echo "  VERCEL_PROJECT_ID: ${VERCEL_PROJECT_ID:+SET}"
          echo "🔧 Checking Prisma installation..."
          pnpm list prisma
          pnpm list @prisma/client
          echo "🔧 Generating Prisma client in root..."
          pnpm exec prisma generate --schema=prisma/schema.prisma
          echo "🔧 Generating Prisma client for apps/web..."
          cd apps/web
          pnpm exec prisma generate --schema=../../prisma/schema.prisma
          cd ../..
          echo "🚀 Running build..."
          pnpm build || (echo "❌ Build failed with exit code $?" && exit 1)
          echo "✅ Build completed successfully!"
          
      - name: Vercel Pull (project settings & env)
        run: |
          echo "📥 Pulling Vercel project settings..."
          npx vercel pull --yes --environment=preview --token ${{ secrets.VERCEL_TOKEN }}
          
      - name: Vercel Build
        run: |
          echo "🔨 Building with Vercel..."
          npx vercel build --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          
      - name: Deploy to Vercel (Staging)
        run: |
          echo "🚀 Deploying to Vercel (preview)..."
          npx vercel deploy --prebuilt --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          
      - name: Notify staging deployment
        run: |
          echo "🚀 Staging deployment completed!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "URL: https://sprutnet-staging.vercel.app"
          
      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          # Add basic smoke tests here
          echo "✅ Smoke tests passed"
